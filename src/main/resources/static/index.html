<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusMind - 知识管理系统</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel (用于 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Quill Editor CSS -->
    <link href="https://unpkg.com/quill@1.3.6/dist/quill.snow.css" rel="stylesheet">

    <!-- Quill Editor JS -->
    <script src="https://unpkg.com/quill@1.3.6/dist/quill.js"></script>

    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- 自定义样式 -->
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .quill-editor {
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            min-height: 400px;
        }

        .ql-toolbar {
            border: 1px solid #e2e8f0 !important;
            border-radius: 8px 8px 0 0 !important;
            background: #f8fafc !important;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .ql-container {
            border: 1px solid #e2e8f0 !important;
            border-radius: 0 0 8px 8px !important;
            font-family: 'Arial', sans-serif !important;
            min-height: 400px;
            font-size: 16px;
        }

        .ql-editor {
            min-height: 400px;
            font-size: 16px;
            line-height: 1.6;
            padding: 20px;
        }

        .ql-editor.ql-blank::before {
            font-style: normal;
            color: #9ca3af;
        }

        .note-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .note-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .sidebar-item {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .sidebar-item:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateX(4px);
        }

        .sidebar-item.active {
            background: rgba(102, 126, 234, 0.2);
            border-left: 3px solid #667eea;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const API_BASE = 'http://localhost:8080/api';

    function App() {
        const [notes, setNotes] = useState([]);
        const [categories, setCategories] = useState([]);
        const [tags, setTags] = useState([]);
        const [currentNote, setCurrentNote] = useState(null);
        const [title, setTitle] = useState('');
        const [content, setContent] = useState('');
        const [summary, setSummary] = useState('');
        const [selectedCategory, setSelectedCategory] = useState(null);
        const [selectedTags, setSelectedTags] = useState([]);
        const [isLoading, setIsLoading] = useState(false);
        const [searchKeyword, setSearchKeyword] = useState('');
        const [activeTab, setActiveTab] = useState('all');
        const [selectedNoteIds, setSelectedNoteIds] = useState([]);
        const editorRef = useRef(null);
        const quillRef = useRef(null);

        // 加载分类和标签
        const loadCategoriesAndTags = async () => {
            try {
                const [categoriesRes, tagsRes] = await Promise.all([
                    axios.get(`${API_BASE}/categories`),
                    axios.get(`${API_BASE}/tags`)
                ]);
                setCategories(categoriesRes.data);
                setTags(tagsRes.data);
            } catch (error) {
                console.error('加载分类和标签失败:', error);
            }
        };

        useEffect(() => {
            loadNotes();
            loadCategoriesAndTags();
        }, []);

        useEffect(() => {
            if (editorRef.current && !quillRef.current) {
                const quill = new Quill(editorRef.current, {
                    theme: 'snow',
                    modules: {
                        toolbar: [
                            [{ 'font': [] }],
                            [{ 'size': ['small', false, 'large', 'huge'] }],
                            [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            [{ 'color': [] }, { 'background': [] }],
                            [{ 'script': 'sub'}, { 'script': 'super' }],
                            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                            [{ 'indent': '-1'}, { 'indent': '+1' }],
                            [{ 'align': [] }],
                            ['blockquote', 'code-block'],
                            ['link', 'image', 'video'],
                            ['clean']
                        ]
                    },
                    placeholder: '在这里输入内容，支持丰富的格式编辑...'
                });

                quill.on('text-change', () => {
                    setContent(quill.root.innerHTML);
                });

                quillRef.current = quill;
            }
        }, []);

        const loadNotes = async () => {
            try {
                setIsLoading(true);
                const response = await axios.get(`${API_BASE}/notes`);
                setNotes(response.data.content || response.data);
                setIsLoading(false);
            } catch (error) {
                console.error('加载笔记失败:', error);
                setIsLoading(false);
            }
        };

        const saveNote = async () => {
            if (!title.trim()) {
                alert('请输入笔记标题');
                return;
            }

            try {
                setIsLoading(true);
                const noteData = {
                    title,
                    content,
                    summary,
                    categoryId: selectedCategory,
                    tagIds: selectedTags,
                    isPublic: false
                };

                if (currentNote && currentNote.id) {
                    await axios.put(`${API_BASE}/notes/${currentNote.id}`, noteData);
                } else {
                    await axios.post(`${API_BASE}/notes`, noteData);
                }

                resetForm();
                await loadNotes();

                setIsLoading(false);
                alert('笔记保存成功！');
            } catch (error) {
                console.error('保存笔记失败:', error);
                setIsLoading(false);
                alert('保存失败，请重试');
            }
        };

        const resetForm = () => {
            setCurrentNote(null);
            setTitle('');
            setContent('');
            setSummary('');
            setSelectedCategory(null);
            setSelectedTags([]);
            if (quillRef.current) {
                quillRef.current.root.innerHTML = '';
            }
        };

        const toggleTag = (tagId) => {
            setSelectedTags(prev =>
                prev.includes(tagId)
                    ? prev.filter(id => id !== tagId)
                    : [...prev, tagId]
            );
        };

        const searchNotes = async () => {
            if (!searchKeyword.trim()) {
                await loadNotes();
                return;
            }

            try {
                setIsLoading(true);
                const response = await axios.get(`${API_BASE}/notes/search`, {
                    params: { keyword: searchKeyword }
                });
                setNotes(response.data.content || response.data);
                setIsLoading(false);
            } catch (error) {
                console.error('搜索失败:', error);
                setIsLoading(false);
            }
        };

        const deleteNote = async (id) => {
            if (!confirm('确定要删除这篇笔记吗？')) return;

            try {
                setIsLoading(true);
                await axios.delete(`${API_BASE}/notes/${id}`);
                await loadNotes();
                setIsLoading(false);
            } catch (error) {
                console.error('删除失败:', error);
                setIsLoading(false);
                alert('删除失败，请重试');
            }
        };

        const editNote = (note) => {
            setCurrentNote(note);
            setTitle(note.title);
            setContent(note.content);
            setSummary(note.summary || '');

            if (quillRef.current) {
                quillRef.current.root.innerHTML = note.content || '';
            }
        };

        const toggleNoteSelection = (noteId) => {
            setSelectedNoteIds(prev =>
                prev.includes(noteId)
                    ? prev.filter(id => id !== noteId)
                    : [...prev, noteId]
            );
        };

        const exportToMarkdown = async (noteId) => {
            try {
                const response = await axios.get(`${API_BASE}/notes/${noteId}/export/markdown`, {
                    responseType: 'blob'
                });
                const url = window.URL.createObjectURL(new Blob([response.data]));
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', `note_${noteId}.md`);
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('导出 Markdown 失败:', error);
                alert('导出失败，请重试');
            }
        };

        const exportToWord = async (noteId) => {
            try {
                const response = await axios.get(`${API_BASE}/notes/${noteId}/export/word`, {
                    responseType: 'blob'
                });
                const url = window.URL.createObjectURL(new Blob([response.data]));
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', `note_${noteId}.docx`);
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('导出 Word 失败:', error);
                alert('导出失败，请重试');
            }
        };

        const exportMultipleToMarkdown = async () => {
            if (selectedNoteIds.length === 0) {
                alert('请至少选择一个笔记');
                return;
            }

            try {
                const response = await axios.post(`${API_BASE}/notes/export/markdown`, selectedNoteIds, {
                    responseType: 'blob'
                });
                const url = window.URL.createObjectURL(new Blob([response.data]));
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', 'notes_export.zip');
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
                setSelectedNoteIds([]);
            } catch (error) {
                console.error('批量导出 Markdown 失败:', error);
                alert('导出失败，请重试');
            }
        };

        const exportMultipleToWord = async () => {
            if (selectedNoteIds.length === 0) {
                alert('请至少选择一个笔记');
                return;
            }

            try {
                const response = await axios.post(`${API_BASE}/notes/export/word`, selectedNoteIds, {
                    responseType: 'blob'
                });
                const url = window.URL.createObjectURL(new Blob([response.data]));
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', 'notes_export_word.zip');
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
                setSelectedNoteIds([]);
            } catch (error) {
                console.error('批量导出 Word 失败:', error);
                alert('导出失败，请重试');
            }
        };

        const generateAISummary = async () => {
            if (!content) {
                alert('请先输入笔记内容');
                return;
            }

            try {
                setIsLoading(true);
                const tempNote = { title: title || '临时笔记', content, isPublic: false };
                const response = await axios.post(`${API_BASE}/notes`, tempNote);
                const noteId = response.data.id;

                const summaryResponse = await axios.post(`${API_BASE}/notes/${noteId}/summary`);
                setSummary(summaryResponse.data.summary);

                setIsLoading(false);
            } catch (error) {
                console.error('生成摘要失败:', error);
                setIsLoading(false);
                alert('AI 摘要生成失败，请稍后重试');
            }
        };

        return (
            <div className="flex min-h-screen">
                {/* 侧边栏 */}
                <div className="sidebar w-64 p-6 shadow-lg">
                    <div className="mb-8">
                        <h1 className="text-3xl font-bold bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent">
                            NexusMind
                        </h1>
                        <p className="text-gray-600 text-sm mt-2">知识管理系统</p>
                    </div>

                    <nav className="space-y-2 mb-6">
                        <div
                            className={`sidebar-item p-3 rounded-lg flex items-center ${activeTab === 'all' ? 'active' : ''}`}
                            onClick={() => setActiveTab('all')}
                        >
                            <span className="text-xl mr-3">📝</span>
                            <span>全部笔记</span>
                        </div>
                    </nav>

                    {/* 分类展示 */}
                    <div className="mb-6">
                        <h3 className="text-sm font-semibold text-gray-700 mb-2 uppercase">📁 分类</h3>
                        <div className="space-y-1">
                            {categories.map(category => (
                                <div
                                    key={category.id}
                                    className={`sidebar-item p-2 rounded-lg flex items-center text-sm ${selectedCategory === category.id ? 'active' : ''}`}
                                    onClick={() => setSelectedCategory(selectedCategory === category.id ? null : category.id)}
                                >
                                    <span className="text-lg mr-2">📂</span>
                                    <span className="flex-1">{category.name}</span>
                                    <span className="text-xs text-gray-500">
                                        {category.description}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 标签展示 */}
                    <div>
                        <h3 className="text-sm font-semibold text-gray-700 mb-2 uppercase">🏷️ 标签</h3>
                        <div className="flex flex-wrap gap-2">
                            {tags.map(tag => (
                                <span
                                    key={tag.id}
                                    className={`px-3 py-1 rounded-full text-xs font-medium cursor-pointer transition-all ${
                                        selectedTags.includes(tag.id)
                                            ? 'bg-purple-500 text-white shadow-md'
                                            : 'bg-gray-200 text-gray-700 hover:bg-purple-300'
                                    }`}
                                    style={{
                                        backgroundColor: selectedTags.includes(tag.id) ? tag.color : '',
                                        borderColor: tag.color
                                    }}
                                    onClick={() => toggleTag(tag.id)}
                                >
                                    {tag.name}
                                </span>
                            ))}
                        </div>
                    </div>
                </div>

                {/* 主内容区 */}
                <div className="flex-1 p-8">
                    <div className="glass-effect p-8">
                        {/* 选中的分类和标签提示 */}
                        {(selectedCategory || selectedTags.length > 0) && (
                            <div className="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                                <div className="flex items-center gap-2 text-sm">
                                    <span className="font-medium">筛选条件：</span>
                                    {selectedCategory && (
                                        <span className="px-2 py-1 bg-purple-100 text-purple-700 rounded">
                                            📂 {categories.find(c => c.id === selectedCategory)?.name}
                                        </span>
                                    )}
                                    {selectedTags.map(tagId => (
                                        <span
                                            key={tagId}
                                            className="px-2 py-1 bg-purple-500 text-white rounded"
                                        >
                                            🏷️ {tags.find(t => t.id === tagId)?.name}
                                        </span>
                                    ))}
                                    <button
                                        onClick={() => {
                                            setSelectedCategory(null);
                                            setSelectedTags([]);
                                        }}
                                        className="ml-auto text-red-500 hover:text-red-700"
                                    >
                                        清除 ✕
                                    </button>
                                </div>
                            </div>
                        )}

                        <div className="flex justify-between items-center mb-6">
                            <div className="flex-1 mr-4">
                                <input
                                    type="text"
                                    placeholder="🔍 搜索笔记..."
                                    value={searchKeyword}
                                    onChange={(e) => setSearchKeyword(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && searchNotes()}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                                />
                            </div>
                            <button
                                onClick={searchNotes}
                                className="btn-primary px-6 py-2 rounded-lg text-white font-medium"
                            >
                                搜索
                            </button>
                            <button
                                onClick={resetForm}
                                className="ml-2 px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50"
                            >
                                新建
                            </button>
                        </div>

                        {/* 批量导出按钮 */}
                        {selectedNoteIds.length > 0 && (
                            <div className="mb-4 p-3 bg-purple-50 border border-purple-200 rounded-lg">
                                <div className="flex items-center gap-2">
                                    <span className="text-sm font-medium text-purple-700">
                                        已选择 {selectedNoteIds.length} 个笔记
                                    </span>
                                    <button
                                        onClick={exportMultipleToMarkdown}
                                        className="ml-auto px-4 py-1 bg-purple-500 text-white rounded-lg text-sm hover:bg-purple-600"
                                    >
                                        📦 批量导出 Markdown
                                    </button>
                                    <button
                                        onClick={exportMultipleToWord}
                                        className="px-4 py-1 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600"
                                    >
                                        📄 批量导出 Word
                                    </button>
                                    <button
                                        onClick={() => setSelectedNoteIds([])}
                                        className="px-4 py-1 bg-gray-300 text-gray-700 rounded-lg text-sm hover:bg-gray-400"
                                    >
                                        取消选择
                                    </button>
                                </div>
                            </div>
                        )}

                        <div className="mb-8 p-6 bg-white rounded-lg shadow-md">
                            <h2 className="text-2xl font-bold mb-4 text-gray-800">
                                {currentNote ? '✏️ 编辑笔记' : '✨ 创建新笔记'}
                            </h2>

                            <div className="mb-4">
                                <input
                                    type="text"
                                    placeholder="输入笔记标题..."
                                    value={title}
                                    onChange={(e) => setTitle(e.target.value)}
                                    className="w-full px-4 py-3 text-lg border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                                />
                            </div>

                            {/* 分类选择 */}
                            <div className="mb-4">
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    📁 选择分类
                                </label>
                                <div className="flex gap-2 flex-wrap">
                                    {categories.map(category => (
                                        <button
                                            key={category.id}
                                            onClick={() => setSelectedCategory(category.id)}
                                            className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                                                selectedCategory === category.id
                                                    ? 'bg-purple-500 text-white shadow-md'
                                                    : 'bg-gray-100 text-gray-700 hover:bg-purple-200'
                                            }`}
                                        >
                                            📂 {category.name}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="mb-4">
                                <div ref={editorRef} className="quill-editor"></div>
                            </div>

                            {/* 标签选择 */}
                            <div className="mb-4">
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    🏷️ 选择标签
                                </label>
                                <div className="flex gap-2 flex-wrap">
                                    {tags.map(tag => (
                                        <button
                                            key={tag.id}
                                            onClick={() => toggleTag(tag.id)}
                                            className={`px-3 py-1 rounded-full text-sm font-medium transition-all ${
                                                selectedTags.includes(tag.id)
                                                    ? 'text-white shadow-md'
                                                    : 'bg-gray-100 text-gray-700 hover:opacity-80'
                                            }`}
                                            style={{
                                                backgroundColor: selectedTags.includes(tag.id) ? tag.color : ''
                                            }}
                                        >
                                            {tag.name}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="mb-4">
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    AI 摘要
                                </label>
                                <textarea
                                    value={summary}
                                    onChange={(e) => setSummary(e.target.value)}
                                    placeholder="点击按钮自动生成摘要..."
                                    rows="3"
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
                                />
                            </div>

                            <div className="flex gap-2">
                                <button
                                    onClick={saveNote}
                                    disabled={isLoading}
                                    className="btn-primary px-6 py-3 rounded-lg text-white font-medium disabled:opacity-50"
                                >
                                    {isLoading ? '保存中...' : '💾 保存笔记'}
                                </button>
                                <button
                                    onClick={generateAISummary}
                                    disabled={isLoading}
                                    className="px-6 py-3 bg-gradient-to-r from-green-500 to-teal-500 rounded-lg text-white font-medium hover:opacity-90 disabled:opacity-50"
                                >
                                    {isLoading ? '生成中...' : '🤖 AI 生成摘要'}
                                </button>
                                {currentNote && (
                                    <button
                                        onClick={() => deleteNote(currentNote.id)}
                                        className="px-6 py-3 bg-red-500 rounded-lg text-white font-medium hover:bg-red-600"
                                    >
                                        🗑️ 删除
                                    </button>
                                )}
                            </div>
                        </div>

                        <div>
                            <h3 className="text-xl font-bold mb-4 text-gray-800">
                                📚 我的笔记 ({notes.length})
                            </h3>

                            {isLoading && (
                                <div className="flex justify-center py-8">
                                    <div className="loading-spinner"></div>
                                </div>
                            )}

                            {!isLoading && notes.length === 0 && (
                                <div className="text-center py-12 text-gray-500">
                                    <p className="text-6xl mb-4">📝</p>
                                    <p>还没有笔记，快来创建第一篇吧！</p>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {notes.map(note => (
                                    <div className="note-card p-6 bg-white rounded-lg shadow-md border-l-4 border-purple-500">
                                        <div className="flex items-start gap-2 mb-2">
                                            <input
                                                type="checkbox"
                                                checked={selectedNoteIds.includes(note.id)}
                                                onChange={(e) => {
                                                    e.stopPropagation();
                                                    toggleNoteSelection(note.id);
                                                }}
                                                onClick={(e) => e.stopPropagation()}
                                                className="mt-1 w-4 h-4 text-purple-600 rounded focus:ring-purple-500"
                                            />
                                            <h4 className="text-lg font-bold text-gray-800 truncate flex-1">
                                                {note.title}
                                            </h4>
                                        </div>
                                        <p className="text-sm text-gray-600 mb-3 line-clamp-2">
                                            {note.summary || '暂无摘要'}
                                        </p>
                                        <div className="flex justify-between items-center text-xs text-gray-500">
                                            <span>📅 {new Date(note.createdAt).toLocaleDateString('zh-CN')}</span>
                                            <div className="flex gap-2">
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        editNote(note);
                                                    }}
                                                    className="text-purple-500 hover:text-purple-700"
                                                    title="编辑笔记"
                                                >
                                                    ✏️ 编辑
                                                </button>
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        exportToMarkdown(note.id);
                                                    }}
                                                    className="text-green-500 hover:text-green-700"
                                                    title="导出为 Markdown"
                                                >
                                                    📝 MD
                                                </button>
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        exportToWord(note.id);
                                                    }}
                                                    className="text-blue-500 hover:text-blue-700"
                                                    title="导出为 Word"
                                                >
                                                    📄 Word
                                                </button>
                                                <button
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        deleteNote(note.id);
                                                    }}
                                                    className="text-red-500 hover:text-red-700"
                                                >
                                                    🗑️
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
