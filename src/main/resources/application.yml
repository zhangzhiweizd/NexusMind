# NexusMind 应用主配置文件
# 此文件为公共配置，环境特定配置在 application-{profile}.yml 中

server:
  port: 8080

spring:
  application:
    name: NexusMind
  # 通过 Maven Profile 动态激活环境
  profiles:
    active: @spring.profiles.active@
  # 公共配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# JWT 配置（公共）
jwt:
  expiration-ms: 86400000 # 24 hours
  refresh-expiration-ms: 604800000 # 7 days

# SpringDoc 配置（公共 - 默认禁用）
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

# 文件上传配置
file:
  upload:
    # 本地存储路径
    local-path: ./uploads
    # 最大文件大小（10MB）
    max-file-size: 10485760
    # URL前缀
    url-prefix: /api/files
