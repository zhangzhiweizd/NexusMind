# NexusMind 应用主配置文件
# 此文件为公共配置，环境特定配置在 application-{profile}.yml 中

server:
  port: 8080

spring:
  application:
    name: NexusMind
  # 默认激活开发环境
  profiles:
    active: dev
  # 公共配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# JWT 配置（公共）
jwt:
  expiration-ms: 86400000 # 24 hours
  refresh-expiration-ms: 604800000 # 7 days

# SpringDoc 配置（公共）
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
